# Nginx FastCGI Buffer Configuration
# This file contains the recommended nginx configuration to fix "upstream sent too big header" errors
# 
# WHY THIS ERROR APPEARS:
# =======================
# 1. Laravel/Lumen responses include many headers:
#    - Session cookies (can be large, especially with database sessions)
#    - CORS headers (Access-Control-Allow-*)
#    - CSRF tokens
#    - Cache-Control, X-* headers
#    - Laravel framework headers
#
# 2. Nginx default fastcgi buffer size is small (usually 4k-8k)
#    - Default: fastcgi_buffer_size 4k
#    - Default: fastcgi_buffers 8 4k
#    - Total: ~32k maximum
#
# 3. When headers exceed this limit, nginx throws "upstream sent too big header" error
#
# WHY IT WASN'T SHOWING BEFORE:
# =============================
# 1. Before adding CORS headers manually, headers were smaller
# 2. Before session middleware might not have been adding large cookies
# 3. Before there were fewer Laravel middleware adding headers
# 4. Buffer size might have been larger before (if custom config existed)
#
# SOLUTION:
# =========
# Add these directives to your nginx server block for PHP-FPM locations:

location ~ \.php$ {
    # Increase FastCGI buffer sizes to maximum safe values
    # These values allow up to ~256k of response headers (more than enough)
    fastcgi_buffer_size 128k;
    fastcgi_buffers 4 128k;
    fastcgi_busy_buffers_size 256k;
    
    # Increase timeouts to handle slow responses
    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
    
    # Other FastCGI settings
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    
    # ... rest of your fastcgi configuration
}

# OPTIONAL: Increase client header buffer sizes as well (for large request headers)
client_header_buffer_size 8k;
large_client_header_buffers 8 64k;

# HOW TO APPLY:
# =============
# 1. Find your nginx configuration file (usually in /etc/nginx/sites-available/ or /etc/nginx/nginx.conf)
# 2. Locate the "location ~ \.php$" block for analytics.nafezly.com
# 3. Add the fastcgi_buffer_size directives above
# 4. Reload nginx: sudo nginx -t && sudo systemctl reload nginx

